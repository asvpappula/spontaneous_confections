  <circle cx="50" cy="50" r="39.5" fill="none" stroke="#74c4e0" stroke-width="2" stroke-linecap="round" stroke-dasharray="47 12" transform="rotate(-14 50 50)" />

  <!-- stars -->
  <path d="M0,-3.6 L0.9,-1.24 L3.42,-1.11 L1.46,0.47 L2.12,2.91 L0,1.53 L-2.12,2.91 L-1.46,0.47 L-3.42,-1.11 L-0.9,-1.24 Z" fill="#74c4e0" transform="translate(15 57)" />
