  <path d="M0,-3.6 L0.9,-1.24 L3.42,-1.11 L1.46,0.47 L2.12,2.91 L0,1.53 L-2.12,2.91 L-1.46,0.47 L-3.42,-1.11 L-0.9,-1.24 Z" fill="#74c4e0" transform="translate(50 89)" />

