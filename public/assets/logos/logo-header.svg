  <!-- Wordmark -->
  <text x="88" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="31" font-weight="700" fill="#34211a" letter-spacing="-0.3">Spontaneous</text>
  <text x="90" y="71" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14.5" font-weight="600" fill="#0c777c" letter-spacing="5.5">CONFECTIONS</text>
